<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Get in Touch - Progamertechhub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="container nav-content">
            <a href="index.html" class="logo">progamertechhub<span></span></a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="amazon-stack.html">Amazon Stack</a>
                <a href="guides.html">Guides</a>
                <a href="about.html">About</a>
                <a href="contact.html" class="active">Contact</a>
            </div>
        </div>
    </nav>

    <section class="contact" style="padding-top: 150px;">
        <div class="container">
            <div class="section-title">
                <h1>Contact the Team</h1>
                <p>Have a question or a product review request? Drop us a line.</p>
            </div>

            <div class="contact-container">
                <form id="contact-form">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="john@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="6" placeholder="How can we help you?" required></textarea>
                    </div>
                    <button type="submit" class="cta-button" style="width: 100%; justify-content: center;">Send Message</button>
                    <p id="form-msg" style="margin-top: 1.5rem; text-align: center; color: var(--secondary); display: none;">Message sent! We'll get back to you shortly.</p>
                </form>
            </div>

            <div style="margin-top: 4rem; text-align: center;">
                <p style="color: var(--text-muted);">Direct Email: <a href="mailto:defomomo8813@gmail.com" style="color: var(--primary);">defomomo8813@gmail.com</a></p>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="affiliate-disclosure">
                <p>&copy; 2026 Progamertechhub. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
